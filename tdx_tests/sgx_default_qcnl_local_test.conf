{
  // Repo-local QCNL config for local TDX attestation tests.
  // ML-DSA collateral is expected to come from a local test service, not Intel PCS.
  // Set both endpoints explicitly so PCK retrieval and verifier collateral use the same
  // repo-controlled local service rather than hidden defaults.
  "pccs_url": "https://localhost:8081/sgx/certification/v4/",
  "collateral_service": "https://localhost:8081/sgx/certification/v4/",

  // Keep retries disabled during tests so verifier failures surface quickly.
  "retry_times": 0,

  // Cache verification collateral locally when available to speed up reruns.
  "verify_collateral_cache_expire_hours": 168,

  // Allow network retrieval when the cache is empty.
  "local_cache_only": false,

  // The local PCCS test service uses a self-signed certificate.
  "use_secure_cert": false
}
