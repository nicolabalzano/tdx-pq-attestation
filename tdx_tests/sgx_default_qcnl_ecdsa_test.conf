{
  // Repo-local QCNL config for the standard ECDSA verifier path.
  // This path uses Intel PCS for verification collateral and does not depend
  // on the repo-local PCCS used by the ML-DSA simulation setup.
  "collateral_service": "https://api.trustedservices.intel.com/sgx/certification/v4/",

  // Keep retries disabled during tests so failures surface quickly.
  "retry_times": 0,

  // Cache verification collateral locally when available to speed up reruns.
  "verify_collateral_cache_expire_hours": 168,

  // Allow network retrieval when the cache is empty.
  "local_cache_only": false,

  // Intel PCS uses a publicly trusted certificate chain.
  "use_secure_cert": true
}
